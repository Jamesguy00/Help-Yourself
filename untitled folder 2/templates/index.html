<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Yourself - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-color: #ffffff;
            --page-bg: #f5f9ff;
            --text-dark: #3c3c3c;
            --text-light: #afafaf;
            --border-gray: #e5e5e5;
            --border-gray-dark: #d4d4d4;
            --duo-green: #58cc02;
            --duo-green-shadow: #46a302;
            --duo-blue: #1cb0f6;
            --duo-blue-shadow: #1899d6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--page-bg);
            background-image: radial-gradient(#d3e3fd 15%, transparent 16%);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }

        .unified-card {
            display: flex;
            flex-direction: row;
            background-color: var(--bg-color);
            border-radius: 24px;
            border: 2px solid var(--border-gray);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 850px;
            overflow: hidden;
        }

        .mascot-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #ffffff; 
        }

        .mascot-image {
            width: 100%;
            max-width: 260px;
            height: auto;
            animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .login-panel {
            flex: 1;
            padding: 48px 40px;
            text-align: center;
            border-left: 2px dashed var(--border-gray);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-placeholder {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--duo-green);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 600;
            background-color: #f7f7f7;
            border: 2px solid var(--border-gray);
            border-bottom: 4px solid var(--border-gray);
            border-radius: 16px;
            outline: none;
            transition: all 0.15s ease;
        }

        input[type="email"]:focus, input[type="password"]:focus {
            background-color: #ffffff;
            border-color: var(--duo-blue);
            border-bottom-color: var(--duo-blue-shadow);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 900;
            color: #ffffff;
            background-color: var(--duo-green);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 var(--duo-green-shadow);
            position: relative;
            margin-top: 8px;
            transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
        }

        .btn-submit:hover { filter: brightness(1.05); }
        .btn-submit:active { transform: translateY(5px); box-shadow: 0 0px 0 var(--duo-green-shadow); }

        /* Custom Divider Style */
        .or-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-light);
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid var(--border-gray);
        }

        .or-divider:not(:empty)::before { margin-right: 1em; }
        .or-divider:not(:empty)::after { margin-left: 1em; }

        /* Beautiful Custom Google Button */
        .btn-google {
            width: 100%;
            padding: 12px 14px;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--text-dark);
            background-color: #ffffff;
            border: 2px solid var(--border-gray);
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--border-gray-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.1s ease;
        }

        .btn-google:hover { background-color: #f9f9f9; }
        .btn-google:active { transform: translateY(5px); box-shadow: 0 0px 0 var(--border-gray-dark); }
        
        .google-icon { width: 24px; height: 24px; }

        /* Modal Overlay Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(44, 62, 80, 0.4); 
            display: flex;
            justify-content: center; 
            align-items: center; 
            z-index: 2000;
            backdrop-filter: blur(5px); 
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-box {
            background-color: var(--bg-color); border: 2px solid var(--border-gray);
            border-radius: 24px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            width: 100%; max-width: 420px; padding: 32px; text-align: center;
            opacity: 0;
        }

        .modal-overlay.show-modal { 
            opacity: 1; 
            visibility: visible; 
        }

        .modal-overlay.show-modal .modal-box { 
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        .modal-icon-wrapper {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px auto;
            color: var(--duo-green);
        }

        .modal-box h3 { font-size: 1.5rem; font-weight: 900; margin-bottom: 12px; color: var(--duo-green); }
        .modal-box p { font-size: 1rem; font-weight: 700; color: var(--text-dark); line-height: 1.5; margin-bottom: 12px; }

        @keyframes dropIn {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .unified-card { flex-direction: column; max-width: 400px; }
            .mascot-panel { padding: 32px 32px 0 32px; }
            .mascot-image { max-width: 180px; }
            .login-panel { border-left: none; border-top: 2px dashed var(--border-gray); padding: 32px; }
        }
    </style>
</head>
<body>

    <div class="unified-card">
        <div class="mascot-panel">
           <img class="mascot-image" src="../static/image-removebg-preview (8).png" alt="Help Yourself Mascot">
        </div> 
        
        <div class="login-panel">
            <div class="logo-placeholder">Help Yourself</div>
            <h2>Log in to continue</h2>

            <form id="login-form">
                <div class="form-group">
                    <label for="user-email">Email Address</label>
                    <input type="email" id="user-email" placeholder="name@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="user-password">Password</label>
                    <input type="password" id="user-password" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Log In</button>
            </form>

            <div class="or-divider">OR</div>

            <button class="btn-google" id="custom-google-btn">
                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    <path fill="none" d="M0 0h48v48H0z"></path>
                </svg>
                Continue with Google
            </button>
        </div>
    </div>

    <div id="custom-alert-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            <h3>Welcome Back!</h3>
            <p>Logged in successfully. Redirecting...</p>
        </div>
    </div>
    
    <script>
        // --- 1. Google Authentication Setup ---
        // Initialize the Google Identity Services client with your Client ID
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "527203495275-4tkme98p74hqv2f9doeec5j92gq5c39d.apps.googleusercontent.com",
                callback: handleCredentialResponse,
                context: "signin"
            });
        };

        // Trigger the Google popup programmatically when the custom button is clicked
        document.getElementById('custom-google-btn').addEventListener('click', function() {
            google.accounts.id.prompt(); 
        });

        // Handle the response once the user successfully signs in via Google
        function handleCredentialResponse(response) {
            if (response.credential) {
                console.log("Encoded JWT ID token received.");
                triggerSuccessFlow();
            }
        }

        // --- 2. Standard Form Submission Setup ---
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = "Logging in...";
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.7";

            triggerSuccessFlow();
        });

        // --- 3. UI Success Animation & Redirect ---
        function triggerSuccessFlow() {
            document.getElementById('custom-alert-overlay').classList.add('show-modal');
            
            setTimeout(function() {
                // Redirects to the Flask route, not the raw HTML file name
                window.location.replace("/home"); 
            }, 1800);
        }
    </script>
</body>
</html>
