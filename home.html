<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duolingo Tree Engine - Academic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --duo-green: #58cc02;
            --duo-green-dark: #46a302;
            --duo-green-light: #eefbe7;
            --duo-gray: #afafaf;
            --duo-gray-dark: #777777;
            --duo-border: #e5e5e5;
            --duo-text: #3c3c3c;
            --duo-blue: #1cb0f6;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.06);
            --bounce-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --smooth-easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- RESET & FOUNDATION --- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #f7f9fa; color: var(--duo-text); }
        .app-layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; z-index: 1; }

        /* Particle Canvas Layer */
        #confetti-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999;
        }

        /* --- TOP ZONE: IMMERSIVE FULL-VIEWPORT VIDEO --- */
        .tree-viewport {
            background-color: #111111;
            flex: 2.2; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            border-bottom: 2px solid var(--duo-border); 
            overflow: hidden;
        }

        .video-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; background: #111; display: flex; align-items: center; justify-content: center;
        }

        #tree-video { display: block; width: 100%; height: 100%; object-fit: cover; }

        /* Floating HUD elements */
        .viewport-hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
        }

        .hanging-card {
            position: absolute; top: 0; background: #ffffff;
            border: 2px solid var(--duo-border); border-top: none;
            padding: 12px 20px; border-radius: 0 0 16px 16px;
            box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px;
            pointer-events: auto;
        }
        .hanging-card-left { left: 40px; }
        .hanging-card-right { right: 40px; width: 280px; }
        
        .card-icon {
            background: var(--duo-green-light); border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; color: var(--duo-green-dark);
        }
        .card-info h3 { font-size: 0.7rem; color: var(--duo-gray); text-transform: uppercase; font-weight: 800; letter-spacing: 0.8px; }
        .card-info p { font-size: 1rem; font-weight: 900; color: var(--duo-text); }

        /* Progress Bar */
        .xp-wrapper { flex-grow: 1; }
        .xp-meta { display: flex; justify-content: flex-end; font-weight: 800; font-size: 0.8rem; margin-bottom: 4px; color: var(--duo-gray-dark); }
        .bar-rail { background: var(--duo-border); height: 12px; border-radius: 99px; overflow: hidden; }
        .bar-fill {
            height: 100%; width: 0%; border-radius: 99px;
            background: repeating-linear-gradient(-45deg, var(--duo-green), var(--duo-green) 12px, #68e305 12px, #68e305 24px);
            background-size: 34px 34px; animation: moveStripes 1s linear infinite;
            transition: width 0.8s var(--bounce-easing);
        }
        @keyframes moveStripes { 100% { background-position: 34px 0; } }

        /* Error state overlay */
        .video-error-state {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(42, 42, 42, 0.95); color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            font-size: 0.9rem; font-weight: 700; z-index: 10; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .video-error-state.visible { opacity: 1; pointer-events: auto; }

        /* Greyish AI Scanner Overlay */
        .scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(240, 242, 245, 0.9); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 100; overflow: hidden;
        }
        .scanner-laser {
            position: absolute; width: 100%; height: 2px; background: var(--duo-blue);
            box-shadow: 0 0 15px 4px rgba(28, 176, 246, 0.4); animation: scanSweeper 1.2s ease-in-out infinite alternate;
        }
        @keyframes scanSweeper { 0% { top: 5%; opacity: 0; } 10%, 90% { opacity: 1; } 100% { top: 95%; opacity: 0; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .scan-card {
            background: white; padding: 24px 44px; border-radius: 20px; border: 1px solid var(--duo-border);
            text-align: center; font-weight: 800; color: var(--duo-gray-dark); position: relative; z-index: 2; box-shadow: var(--shadow-sm);
        }

        /* --- BOTTOM ZONE: SQUISH-PROOF TASKS --- */
        .tasks-container {
            background-color: #ffffff; flex: 1; padding: 24px 40px 0px 40px;
            display: flex; flex-direction: column; position: relative; overflow: hidden; z-index: 10;
        }

        .tasks-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 1.4rem; font-weight: 900; letter-spacing: -0.3px; }
        
        .scrollable-task-stream {
            display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex-grow: 1; padding: 4px 4px 80px 4px;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 88%, transparent 100%);
        }
        .scrollable-task-stream::-webkit-scrollbar { width: 6px; }
        .scrollable-task-stream::-webkit-scrollbar-track { background: transparent; }
        .scrollable-task-stream::-webkit-scrollbar-thumb { background: var(--duo-border); border-radius: 10px; }

        .minimal-task-card {
            flex-shrink: 0; min-height: 80px; background: #ffffff; border: 2px solid var(--duo-border); border-bottom: 4px solid var(--duo-border);
            border-radius: 16px; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
            position: relative; overflow: hidden; opacity: 0; transform: translateY(30px);
            animation: slideUpFade 0.5s var(--bounce-easing) forwards; transition: transform 0.2s ease, border-color 0.2s;
        }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        .minimal-task-card::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--duo-green-light); transition: left 0.35s var(--smooth-easing); z-index: 0;
        }
        .minimal-task-card:hover:not(.completed) { border-color: #d4d4d4; transform: translateY(-2px); }
        .minimal-task-card:hover:not(.completed)::before { left: 0; }
        .minimal-task-card > * { position: relative; z-index: 1; }

        .minimal-task-card.completed {
            background: #f0f9ff; border-color: var(--duo-blue); border-bottom-width: 2px;
            transform: scale(0.98); pointer-events: none;
        }
        .minimal-task-card.completed::before { display: none; }

        .task-info-block { display: flex; align-items: center; gap: 16px; width: 70%; }
        .task-icon { color: var(--duo-gray); display: flex; align-items: center; }
        .task-headline h4 { font-size: 1.1rem; font-weight: 800; color: var(--duo-text); line-height: 1.2; }
        .task-headline p { font-size: 0.9rem; color: var(--duo-gray-dark); font-weight: 700; margin-top: 4px; }
        
        /* Professional Feedback Styling */
        .task-headline .pro-feedback { 
            font-size: 0.9rem; 
            color: var(--duo-blue); 
            font-weight: 700; 
            margin-top: 8px; 
            display: block; 
            border-left: 3px solid var(--duo-blue); 
            padding-left: 10px; 
            line-height: 1.4;
        }
        
        .xp-label { color: var(--duo-green-dark); font-weight: 900; }

        /* Action Buttons */
        .action-camera-btn {
            background: #ffffff; color: var(--duo-text); border: 2px solid var(--duo-border);
            border-bottom: 4px solid var(--duo-border); padding: 10px 18px; font-size: 0.9rem;
            font-weight: 800; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.1s var(--bounce-easing); white-space: nowrap; outline: none;
        }
        .action-camera-btn:hover { transform: scale(1.03); border-color: var(--duo-gray); }
        .action-camera-btn:active { border-bottom-width: 0px; transform: translateY(4px) scale(0.97); }
        .action-camera-btn.verified {
            background: var(--duo-blue) !important; color: #ffffff !important; border: 2px solid #1899d6 !important;
            border-bottom: 4px solid #1899d6 !important; cursor: default; transform: none !important;
        }

        /* --- MODALS (Alerts) --- */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 10000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal {
            background: white; border-radius: 24px; padding: 30px; width: 100%; max-width: 400px;
            box-shadow: var(--shadow-lg); border: 2px solid var(--duo-border);
        }
        
        /* Pop Animations for the Modal */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        .modal h2 { margin-bottom: 12px; font-weight: 900; letter-spacing: -0.5px; }
        .save-btn {
            background: #1cb0f6; color: white; border: none; border-bottom: 4px solid #1899d6;
            padding: 12px; width: 100%; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer;
        }
        .save-btn:active { border-bottom-width: 0px; transform: translateY(4px); }

        .hidden-uploader { display: none; }
    </style>
</head>
<body>

            <button class="save-btn" onclick="app.closeAlert()">Understood</button>
        </div>
    </div>

        // Standardized unified pool generation
        const tasks = {};
        Object.keys(easyTasks).forEach(k => { tasks[k] = { title: easyTasks[k].task, description: easyTasks[k].proof, xp: 20 }; });

        Object.keys(hardTasks).forEach(k => { tasks[k] = { title: hardTasks[k].task, description: hardTasks[k].proof, xp: 60 }; });

        class ParticleEngine {
            constructor() {
                this.canvas = document.getElementById('confetti-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.colors = ['#58cc02', '#ff9600', '#ce82ff', '#1cb0f6', '#ff4b4b'];
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            fire() {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 3;
                for(let i = 0; i < 100; i++) {
                    this.particles.push({
                        x: centerX, y: centerY,
                        vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 1) * 20,
                        size: Math.random() * 8 + 4,
                        color: this.colors[Math.floor(Math.random() * this.colors.length)],
                        gravity: 0.5, rotation: Math.random() * 360, rotationSpeed: (Math.random() - 0.5) * 10
                    });
                }
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for(let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.rotation += p.rotationSpeed;
                    this.ctx.save();
                    this.ctx.translate(p.x, p.y); this.ctx.rotate(p.rotation * Math.PI / 180);
                    this.ctx.fillStyle = p.color; this.ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    this.ctx.restore();
                    if(p.y > this.canvas.height) this.particles.splice(i, 1);
                }
                requestAnimationFrame(() => this.animate());
            }
        }

        class VideoEngine {
            constructor() {
                this.videoElement = document.getElementById('tree-video');
                this.errorDisplay = document.getElementById('video-error');
                this.checkInterval = null;
                this.bindEvents();
            }
            bindEvents() {
                this.videoElement.addEventListener('error', (e) => {
                    console.error("Video Engine Error", e);
                    this.errorDisplay.classList.add('visible');
                }, true);
            }
            initStage(stageNumber) {
                const data = CONFIG.stageTimestamps[stageNumber];
                if (!data) return;
                if (this.videoElement.readyState >= 1) {
                    this.videoElement.currentTime = data.start;
                } else {
                    this.videoElement.addEventListener('loadedmetadata', () => {
                        this.videoElement.currentTime = data.start;
                    }, { once: true });
                }
            }
            playSegment(stageNumber) {
                const targetTimes = CONFIG.stageTimestamps[stageNumber];
                if (!targetTimes) return;
                this.videoElement.currentTime = targetTimes.start;
                let playPromise = this.videoElement.play();
                if (playPromise !== undefined) { playPromise.catch(err => console.warn(err)); }
                if (this.checkInterval) clearInterval(this.checkInterval);
                this.checkInterval = setInterval(() => {
                    if (this.videoElement.currentTime >= targetTimes.end) {
                        this.videoElement.pause();
                        clearInterval(this.checkInterval);
                    }
                }, 30);
            }
        }

        class AppManager {
            constructor() {
                this.currentXP = 0;
                this.activeTaskTarget = null;
                
                this.dbState = {
                    user_id: "00000000-0000-0000-0000-000000000000",
                    tree_stage: 1,
                    completed_history: {}, 
                    daily_tasks: [],       
                    last_reset_date: ""    
                };

                this.particles = new ParticleEngine();
                this.videoEngine = new VideoEngine();
                
                this.domElements = {
                    feed: document.getElementById('task-feed'),
                    cameraInput: document.getElementById('camera-bridge'),
                    overlay: document.getElementById('loader-overlay'),
                    loaderText: document.getElementById('loader-text'),
                    xpBar: document.getElementById('xp-bar'),
                    xpText: document.getElementById('xp-text'),
                    alertBackdrop: document.getElementById('custom-alert-backdrop'),
                    alertTitle: document.getElementById('custom-alert-title'),
                    alertMessage: document.getElementById('custom-alert-message'),
                    stageName: document.getElementById('stage-display-name')
                };

                this.bindEvents();
                this.initialize();
            }

            bindEvents() {
                this.domElements.cameraInput.addEventListener('change', () => this.handleImageUpload());
            }

            async initialize() {
                await this.loadRowFromDatabase();
                this.videoEngine.initStage(this.dbState.tree_stage);
                this.checkDailyRotation();
            }

            async loadRowFromDatabase() {
                const storedState = localStorage.getItem('app_db_row');
                if (storedState) {
                    try {
                        this.dbState = JSON.parse(storedState);
                    } catch (e) {
                        console.error("Malformed row structure, resetting parameters.", e);
                    }
                } else {
                    this.dbState.tree_stage = 1;
                    this.dbState.completed_history = { current_xp: 0 };
                    this.dbState.daily_tasks = [];
                    this.dbState.last_reset_date = "";
                    this.saveRowToDatabase();
                }
                
                if (this.dbState.completed_history.current_xp === undefined) {
                    this.dbState.completed_history.current_xp = 0;
                }
                this.currentXP = parseInt(this.dbState.completed_history.current_xp) || 0;
            }

            async saveRowToDatabase() {
                this.dbState.completed_history.current_xp = this.currentXP;
                localStorage.setItem('app_db_row', JSON.stringify(this.dbState));
            }

            checkDailyRotation() {
                const todayStr = new Date().toISOString().split('T')[0];
                
                if (this.dbState.last_reset_date !== todayStr || !this.dbState.daily_tasks || this.dbState.daily_tasks.length === 0) {
                    this.randomizeTasks(todayStr);
                } else {
                    this.renderTasksFeed();
                }
                this.updateUI();
            }

            randomizeTasks(dateString) {
                Object.keys(tasks).forEach(key => {
                    if (tasks[key].completed === undefined) {
                        tasks[key].completed = false;
                    }
                });

                const keys = Object.keys(tasks);
                const numToPick = Math.min(5, keys.length);
                const randomKeys = [];

                while (randomKeys.length < numToPick) {
                    const randomKey = keys[Math.floor(Math.random() * keys.length)];
                    if (!randomKeys.includes(randomKey)) {
                        randomKeys.push(randomKey);
                    }
                }

                const selectedTasks = randomKeys.map(key => {
                    return {
                        id: parseInt(key),
                        title: tasks[key].title,
                        description: tasks[key].description,
                        xp: tasks[key].xp,
                        completed: false,
                        feedback: ""
                    };
                });

                this.dbState.daily_tasks = selectedTasks;
                this.dbState.last_reset_date = dateString;
                
                this.saveRowToDatabase();
                this.renderTasksFeed();
            }

            renderTasksFeed() {
                this.domElements.feed.innerHTML = '';
                this.dbState.daily_tasks.forEach((task, index) => {
                    this.renderTask(task, index);
                });
            }

            renderTask(taskData, index) {
                const delay = (index * 0.1) + "s";
                const isCompleted = taskData.completed ? 'completed' : '';
                const buttonContent = taskData.completed 
                    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg> Verified`
                    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg> Verify`;
                const disabledAttr = taskData.completed ? 'disabled' : '';
                const buttonClass = taskData.completed ? 'action-camera-btn verified' : 'action-camera-btn';
                const feedbackHtml = taskData.feedback ? `<span class="pro-feedback">${taskData.feedback}</span>` : '';

                const taskHtml = `
                    <div class="minimal-task-card ${isCompleted}" id="quest-${taskData.id}" data-xp="${taskData.xp}" style="animation-delay: ${delay};">
                        <div class="task-info-block">
                            <div class="task-icon">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                            </div>
                            <div class="task-headline">
                                <h4>${taskData.title}</h4>
                                <p id="desc-${taskData.id}"><span class="xp-label">+${taskData.xp} XP</span> • ${taskData.description}</p>
                                ${feedbackHtml}
                            </div>
                        </div>
                        <button class="${buttonClass}" onclick="app.triggerCamera(${taskData.id})" ${disabledAttr}>
                            ${buttonContent}
                        </button>
                    </div>
                `;
                this.domElements.feed.insertAdjacentHTML('beforeend', taskHtml);
            }

            showAlert(title, message) {
                this.domElements.alertTitle.innerText = title;
                this.domElements.alertMessage.innerText = message;
                this.domElements.alertBackdrop.style.display = 'flex';
                const alertModal = this.domElements.alertBackdrop.querySelector('.modal');
                alertModal.style.animation = 'popIn 0.4s var(--bounce-easing) forwards';
            }
            
            closeAlert() {
                const alertModal = this.domElements.alertBackdrop.querySelector('.modal');
                alertModal.style.animation = 'popOut 0.3s var(--smooth-easing) forwards';
                setTimeout(() => {
                    this.domElements.alertBackdrop.style.display = 'none';
                    alertModal.style.animation = '';
                }, 300);
            }

            triggerCamera(taskId) {
                this.activeTaskTarget = taskId;
                this.domElements.cameraInput.click();
            }

            handleImageUpload() {
                const file = this.domElements.cameraInput.files[0];
                if (!file) return;

                this.domElements.loaderText.innerText = "Analyzing Submission...";
                this.domElements.overlay.style.display = 'flex';

                const reader = new FileReader();
                reader.onload = async (event) => {
                    const base64Data = event.target.result.split(',')[1];
                    await this.verifySubmissionWithAI(base64Data, this.activeTaskTarget);
                };
                reader.readAsDataURL(file);
            }

            async verifySubmissionWithAI(base64Data, taskId) {
                const task = this.dbState.daily_tasks.find(t => t.id === taskId);
                if (!task) return;
                
                try {
                    this.domElements.loaderText.innerText = "Evaluating submission...";
                    
                    const response = await fetch("/api/verify", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            base64Data: base64Data,
                            title: task.title,
                            description: task.description
                        })
                    });

                    // Parse the JSON payload safely
                    const payload = await response.json().catch(() => ({}));

                    // If the Python server threw an error, catch it here and show the real message
                    if (!response.ok) {
                        throw new Error(payload.error || `Server status code: ${response.status}`);
                    }
                    
                    if (!payload.choices || !payload.choices[0]) {
                        throw new Error("Invalid response structure from AI API.");
                    }

                    const jsonString = payload.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
                    const evaluation = JSON.parse(jsonString);

                    this.domElements.overlay.style.display = 'none';

                    if (evaluation.verified === true) {
                        this.processTaskCompletion(taskId, evaluation.professional_feedback);
                    } else {
                        this.showAlert("Verification Failed", evaluation.professional_feedback);
                    }

                } catch (error) {
                    console.error(error);
                    this.domElements.overlay.style.display = 'none';
                    // Displays the actual problem (like token issues or API rejections)
                    this.showAlert("System Error Details", error.message);
                } finally {
                    this.domElements.cameraInput.value = "";
                }
            }

            processTaskCompletion(taskId, professionalFeedback) {
                const task = this.dbState.daily_tasks.find(t => t.id === taskId);
                if (!task || task.completed) return;

                task.completed = true;
                task.feedback = professionalFeedback;
                
                this.dbState.completed_history[taskId] = {
                    timestamp: new Date().toISOString(),
                    feedback: professionalFeedback,
                    reset_cycle_date: this.dbState.last_reset_date
                };

                const card = document.getElementById(`quest-${taskId}`);
                if (card) {
                    const btn = card.querySelector('.action-camera-btn');
                    btn.disabled = true;
                    btn.className = "action-camera-btn verified";
                    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg> Verified`;
                    card.classList.add('completed');

                    const headlineBlock = card.querySelector('.task-headline');
                    headlineBlock.insertAdjacentHTML('beforeend', `<span class="pro-feedback">${professionalFeedback}</span>`);
                }

                this.awardXP(parseInt(task.xp));
            }

            awardXP(amount) {
                this.currentXP += amount;
                if (this.currentXP >= CONFIG.maxXP && this.dbState.tree_stage < CONFIG.maxStage) {
                    this.currentXP -= CONFIG.maxXP;
                    this.levelUp();
                } else if (this.dbState.tree_stage >= CONFIG.maxStage && this.currentXP >= CONFIG.maxXP) {
                    this.currentXP = CONFIG.maxXP;
                }
                this.updateUI();
                this.saveRowToDatabase();
            }

            levelUp() {
                this.dbState.tree_stage++;
                this.particles.fire();
                this.videoEngine.playSegment(this.dbState.tree_stage);
            }

            updateUI() {
                const progressPercentage = Math.min((this.currentXP / CONFIG.maxXP) * 100, 100);
                this.domElements.xpBar.style.width = `${progressPercentage}%`;
                this.domElements.xpText.innerText = `${this.currentXP} / ${CONFIG.maxXP} XP`;
                
                const planNames = { 1: "Evergreen Oak", 2: "Sprouting Willow", 3: "Acacia Core", 4: "Prismatic Sequoia" };
                this.domElements.stageName.innerText = planNames[this.dbState.tree_stage] || "Evergreen Oak";
            }
        }

        const app = new AppManager();
    </script>
